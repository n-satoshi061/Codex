version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: home-stock-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: home_stock_manager
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: stock_user
      MYSQL_PASSWORD: stock_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
